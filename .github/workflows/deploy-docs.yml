name: Deploy docs site

# Storybook 静态站 → GitHub Pages（需在仓库 Settings → Pages 中选择 Source: GitHub Actions）
on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 版本与根目录 package.json 的 packageManager 一致，勿在此再写 version，否则会与 setup-node 冲突
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install
        env:
          # 避免 CI 下 husky prepare 偶发失败；与本地开发无关
          HUSKY: "0"
        run: pnpm install --frozen-lockfile

      # 拆步便于在 Actions 里一眼看到失败点（exit code 2 常见于 tsc/eslint 等）
      - name: Utils typecheck
        run: pnpm utils:typecheck
      - name: Utils build
        run: pnpm utils:build
      - name: Components typecheck
        run: pnpm components:typecheck
      - name: Components test (CI)
        run: pnpm components:test:ci
      - name: Components lint
        run: pnpm components:lint
      - name: Components build
        run: pnpm components:build

      # 默认项目站 URL 为 https://<owner>.github.io/<repo>/，需设置 Vite base
      - name: Build Storybook
        env:
          STORYBOOK_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs-site/storybook-static

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
